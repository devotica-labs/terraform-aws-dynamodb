description: |-
  Terraform module for a single **Amazon DynamoDB** table — the fully managed,
  serverless key-value / document store. Ships a fintech baseline: on-demand
  (PAY_PER_REQUEST) billing, server-side encryption, point-in-time recovery,
  and deletion protection, with focused inputs for global secondary indexes,
  TTL expiry, and change streams.

introduction: |-
  This module creates an [Amazon DynamoDB table](https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/HowItWorks.CoreComponents.html)
  with opinionated, fintech-safe defaults. Rather than a pass-arbitrary-config
  engine, it exposes focused inputs for the pieces that matter: key schema and
  attributes, billing mode, global secondary indexes, TTL, streams, and
  customer-managed encryption. Encryption, point-in-time recovery, and deletion
  protection are on by default.

usage: |-
  See [`examples/complete`](examples/complete) for the full surface (composite
  key, GSI, TTL, streams, CMK) and [`examples/basic`](examples/basic) for a
  hash-key-only table on the fintech defaults.

